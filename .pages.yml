content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{fields.title}.md"
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        options:
          format: "yyyy-MM-dd 00:00:00 +0000"
          time: false
      - name: excerpt
        label: Excerpt
        type: string
        required: false
        description: "Short description shown under the title"
      - name: body
        label: Content
        type: rich-text
