backend:
  name: github
  repo: knowjoby/knowjoby.github.io
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD 00:00:00 +0000" }
      - { label: "Excerpt", name: "excerpt", widget: "string", required: false, hint: "One line shown under the title in the post list" }
      - { label: "Body", name: "body", widget: "markdown" }
