# Decap CMS configuration
# Docs: https://decapcms.org/docs/

backend:
  name: github
  repo: knowjoby/knowjoby.github.io
  branch: main
  # OAuth proxy: Netlify's hosted endpoint.
  # base_url + auth_endpoint -> https://api.netlify.com/auth
  # site_id MUST be the Netlify project hosting the GitHub OAuth provider
  # (knowjoby-blog-auth). Without it, Decap defaults to location.hostname
  # (= knowjoby.github.io) and Netlify returns 404 because no project matches.
  # See: packages/decap-cms-lib-auth/src/netlify-auth.js (getSiteID + URL build).
  base_url: https://api.netlify.com
  auth_endpoint: auth
  site_id: knowjoby-blog-auth.netlify.app

# Where uploaded images go
media_folder: "assets/images"
public_folder: "/assets/images"

# Show a preview link in the editor
site_url: https://knowjoby.github.io
display_url: https://knowjoby.github.io

# Enable drafts -> editorial workflow (creates PRs instead of direct commits)
publish_mode: editorial_workflow

collections:
  - name: "posts"
    label: "Blog posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title",      name: "title",      widget: "string" }
      - { label: "Publish date", name: "date",     widget: "datetime" }
      - { label: "Categories", name: "categories", widget: "list", required: false }
      - { label: "Tags",       name: "tags",       widget: "list", required: false }
      - { label: "Excerpt",    name: "excerpt",    widget: "text", required: false }
      - { label: "Header image", name: "header",   widget: "object", required: false, fields: [
          { label: "Image", name: "image", widget: "image", required: false }
        ]}
      - { label: "Body",       name: "body",       widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "About"
        name: "about"
        file: "about.md"
        fields:
          - { label: "Title",     name: "title",     widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string", default: "/about/" }
          - { label: "Layout",    name: "layout",    widget: "hidden", default: "single" }
          - { label: "Body",      name: "body",      widget: "markdown" }
