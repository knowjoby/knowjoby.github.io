<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>knowjoby — admin</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --panel-2: #1d222c;
    --border: #2a3140;
    --text: #e6e8ee;
    --muted: #8b93a7;
    --accent: #6ea8ff;
    --accent-2: #4d8bff;
    --danger: #ff6b6b;
    --good: #5dd39e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
  header .who { color: var(--muted); font-size: 13px; }
  main { max-width: 900px; margin: 0 auto; padding: 24px; }
  button, .btn {
    background: var(--accent); color: #04111f; border: 0; padding: 8px 14px;
    border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  button:hover { background: var(--accent-2); color: #fff; }
  button.ghost {
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  button.ghost:hover { background: var(--panel-2); }
  button.danger { background: var(--danger); color: #fff; }
  input, textarea, select {
    width: 100%; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
    font: inherit;
  }
  textarea { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; resize: vertical; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; margin-bottom: 16px;
  }
  .post-list { list-style: none; padding: 0; margin: 0; }
  .post-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 8px; background: var(--panel-2);
  }
  .post-list .meta { color: var(--muted); font-size: 13px; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin: 16px 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }
  .preview {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; min-height: 300px; max-height: 60vh; overflow: auto;
  }
  .preview h1, .preview h2, .preview h3 { margin-top: 0.6em; }
  .preview pre { background: #0a0d12; padding: 12px; border-radius: 6px; overflow: auto; }
  .preview code { background: #0a0d12; padding: 2px 5px; border-radius: 3px; font-size: 13px; }
  .status { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 14px; }
  .status.ok { background: rgba(93,211,158,0.12); color: var(--good); border: 1px solid rgba(93,211,158,0.3); }
  .status.err { background: rgba(255,107,107,0.12); color: var(--danger); border: 1px solid rgba(255,107,107,0.3); }
  a { color: var(--accent); }
  code.kbd {
    background: var(--panel-2); padding: 2px 6px; border-radius: 4px;
    font-family: ui-monospace, monospace; font-size: 13px;
  }
  .hidden { display: none !important; }
  .login-card {
    max-width: 420px; margin: 80px auto; text-align: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 40px 36px;
  }
  .login-card h2 { margin: 0 0 8px; font-size: 20px; }
  .login-card p  { color: var(--muted); font-size: 14px; margin: 0 0 28px; }
  .btn-github {
    display: inline-flex; align-items: center; gap: 10px;
    background: #fff; color: #1a1a1a;
    border: 0; padding: 11px 22px; border-radius: 8px;
    font-weight: 600; font-size: 15px; cursor: pointer;
    text-decoration: none; transition: background 0.15s;
  }
  .btn-github:hover { background: #e8ecf0; }
  .btn-github svg  { flex-shrink: 0; }
  details.pat-fallback { margin-top: 28px; text-align: left; }
  details.pat-fallback summary {
    color: var(--muted); font-size: 12px; cursor: pointer;
    user-select: none; list-style: none;
  }
  details.pat-fallback summary::after { content: ' ▸'; }
  details.pat-fallback[open] summary::after { content: ' ▾'; }
  details.pat-fallback .inner { margin-top: 14px; }
  details.pat-fallback input { font-size: 13px; padding: 8px 10px; }
  details.pat-fallback button { font-size: 13px; padding: 8px 14px; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <h1>knowjoby blog · admin</h1>
  <div class="who">
    <span id="whoami" class="muted"></span>
    <button id="logout" class="ghost hidden" style="margin-left:12px">Logout</button>
  </div>
</header>

<main>

  <!-- Login view -->
  <section id="login-view" class="hidden">
    <div class="login-card">
      <h2>knowjoby · admin</h2>
      <p>Sign in with your GitHub account to manage posts.</p>
      <a id="github-login-btn" href="#" class="btn-github">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Login with GitHub
      </a>

      <details class="pat-fallback">
        <summary>Use a Personal Access Token instead</summary>
        <div class="inner">
          <input id="token-input" type="password" placeholder="github_pat_… or ghp_…" autocomplete="off" spellcheck="false" />
          <button id="token-save">Sign in with token</button>
          <div id="setup-status" style="font-size:12px; color:var(--danger); margin-top:6px"></div>
        </div>
      </details>
    </div>
  </section>

  <!-- Main app view -->
  <section id="app-view" class="hidden">

    <div id="status-area"></div>

    <div class="toolbar">
      <button id="new-post">+ New post</button>
      <button id="refresh-list" class="ghost">Refresh</button>
    </div>

    <div id="list-view">
      <h2>Recent posts</h2>
      <ul id="post-list" class="post-list"><li class="muted">Loading…</li></ul>
    </div>

    <div id="edit-view" class="hidden">
      <div class="card">
        <div class="row">
          <div>
            <label for="title">Title</label>
            <input id="title" placeholder="Your post title" />
          </div>
          <div>
            <label for="date">Date</label>
            <input id="date" type="date" />
          </div>
        </div>
        <label for="tags">Tags (comma-separated, optional)</label>
        <input id="tags" placeholder="notes, build-log" />

        <div class="grid-2" style="margin-top: 12px">
          <div>
            <label for="body">Body (Markdown)</label>
            <textarea id="body" rows="18" placeholder="Write in Markdown…"></textarea>
          </div>
          <div>
            <label>Preview</label>
            <div id="preview" class="preview"><em class="muted">Type something to see a preview.</em></div>
          </div>
        </div>

        <div class="toolbar" style="margin-top: 16px">
          <button id="publish">Publish</button>
          <button id="save-draft" class="ghost">Save draft (local)</button>
          <button id="cancel" class="ghost">Cancel</button>
          <span id="edit-status" class="muted" style="font-size:13px; margin-left:auto"></span>
        </div>
      </div>
    </div>

  </section>
</main>

<!-- Markdown renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
(() => {
  const OWNER      = 'knowjoby';
  const REPO       = 'knowjoby.github.io';
  const BRANCH     = 'main';
  const TOKEN_KEY  = 'kjb_admin_token';
  const DRAFT_KEY  = 'kjb_admin_draft';
  const WORKER_URL = 'https://kjb-oauth.jobby-john.workers.dev';

  // --- helpers ---
  const $ = (id) => document.getElementById(id);
  const show = (el) => el.classList.remove('hidden');
  const hide = (el) => el.classList.add('hidden');

  function setStatus(msg, kind) {
    const area = $('status-area');
    area.innerHTML = '';
    if (!msg) return;
    const div = document.createElement('div');
    div.className = 'status ' + (kind || 'ok');
    div.textContent = msg;
    area.appendChild(div);
    if (kind !== 'err') setTimeout(() => { if (area.contains(div)) area.removeChild(div); }, 4000);
  }

  const getToken = () => localStorage.getItem(TOKEN_KEY) || '';
  const setToken = (t) => localStorage.setItem(TOKEN_KEY, t);
  const clearToken = () => localStorage.removeItem(TOKEN_KEY);

  // --- GitHub API ---
  async function gh(path, opts = {}) {
    const res = await fetch('https://api.github.com' + path, {
      ...opts,
      headers: {
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Authorization': 'Bearer ' + getToken(),
        ...(opts.body ? { 'Content-Type': 'application/json' } : {}),
        ...(opts.headers || {}),
      },
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`GitHub ${res.status}: ${body.slice(0, 200)}`);
    }
    return res.status === 204 ? null : res.json();
  }

  async function fetchUser() {
    return gh('/user');
  }

  async function listPosts() {
    try {
      const items = await gh(`/repos/${OWNER}/${REPO}/contents/_posts?ref=${BRANCH}`);
      return items
        .filter((f) => f.type === 'file' && f.name.endsWith('.md'))
        .sort((a, b) => b.name.localeCompare(a.name));
    } catch (e) {
      // 404 means _posts/ doesn't exist yet
      if (String(e).includes('404')) return [];
      throw e;
    }
  }

  function utf8ToBase64(str) {
    return btoa(String.fromCharCode(...new TextEncoder().encode(str)));
  }

  function slugify(s) {
    return s.toLowerCase()
      .replace(/[^a-z0-9\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      .slice(0, 80);
  }

  async function publishPost({ title, date, tags, body }) {
    const slug = slugify(title) || 'untitled';
    const filename = `${date}-${slug}.md`;
    const path = `_posts/${filename}`;
    const frontmatter = [
      '---',
      `title: ${JSON.stringify(title)}`,
      `date: ${date}`,
      tags ? `tags: [${tags.split(',').map((t) => JSON.stringify(t.trim())).filter(Boolean).join(', ')}]` : null,
      '---',
      '',
    ].filter(Boolean).join('\n');
    const content = frontmatter + body + (body.endsWith('\n') ? '' : '\n');

    return gh(`/repos/${OWNER}/${REPO}/contents/${path}`, {
      method: 'PUT',
      body: JSON.stringify({
        message: `New post: ${title}`,
        content: utf8ToBase64(content),
        branch: BRANCH,
      }),
    });
  }

  // --- UI ---

  function renderPostList(items) {
    const ul = $('post-list');
    ul.innerHTML = '';
    if (!items.length) {
      ul.innerHTML = '<li class="muted">No posts yet. Click "+ New post" to write your first one.</li>';
      return;
    }
    for (const it of items) {
      const li = document.createElement('li');
      const left = document.createElement('div');
      // Filename pattern: YYYY-MM-DD-slug.md
      const m = it.name.match(/^(\d{4}-\d{2}-\d{2})-(.+)\.md$/);
      const date = m ? m[1] : '';
      const slug = m ? m[2] : it.name.replace(/\.md$/, '');
      left.innerHTML = `<div style="font-weight:600">${slug.replace(/-/g, ' ')}</div><div class="meta">${date}</div>`;
      const right = document.createElement('div');
      const view = document.createElement('a');
      view.href = `https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/_posts/${it.name}`;
      view.target = '_blank';
      view.rel = 'noopener';
      view.className = 'btn ghost';
      view.style.textDecoration = 'none';
      view.textContent = 'View on GitHub';
      right.appendChild(view);
      li.appendChild(left);
      li.appendChild(right);
      ul.appendChild(li);
    }
  }

  function updatePreview() {
    const text = $('body').value;
    const html = window.marked ? window.marked.parse(text || '') : text;
    $('preview').innerHTML = html || '<em class="muted">Type something to see a preview.</em>';
    saveDraft();
  }

  function saveDraft() {
    const draft = {
      title: $('title').value,
      date: $('date').value,
      tags: $('tags').value,
      body: $('body').value,
    };
    localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
  }

  function loadDraft() {
    try {
      const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
      if (d.title) $('title').value = d.title;
      if (d.date) $('date').value = d.date;
      if (d.tags) $('tags').value = d.tags;
      if (d.body) $('body').value = d.body;
      updatePreview();
    } catch {}
  }

  function clearDraft() {
    localStorage.removeItem(DRAFT_KEY);
  }

  function todayISO() {
    const d = new Date();
    const z = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${z(d.getMonth() + 1)}-${z(d.getDate())}`;
  }

  function openEditor() {
    hide($('list-view'));
    show($('edit-view'));
    if (!$('date').value) $('date').value = todayISO();
    loadDraft();
    $('title').focus();
  }

  function closeEditor() {
    show($('list-view'));
    hide($('edit-view'));
  }

  async function refreshPosts() {
    try {
      const posts = await listPosts();
      renderPostList(posts);
    } catch (e) {
      setStatus(String(e), 'err');
    }
  }

  // --- Auth bootstrap ---
  async function showLogin(msg) {
    // Set the OAuth button href to the live worker
    $('github-login-btn').href = WORKER_URL + '/auth';
    hide($('app-view'));
    show($('login-view'));
    if (msg) {
      $('setup-status').textContent = msg;
    }
  }

  async function start() {
    // 1. Check if returning from OAuth (token in URL hash)
    const hash = new URLSearchParams(location.hash.replace(/^#/, ''));
    const hashToken = hash.get('token');
    if (hashToken) {
      setToken(hashToken);
      history.replaceState(null, '', location.pathname); // clear hash from URL
    }

    const token = getToken();
    if (!token) { showLogin(); return; }

    try {
      const user = await fetchUser();
      $('whoami').textContent = `signed in as ${user.login}`;
      show($('logout'));
      hide($('login-view'));
      show($('app-view'));
      refreshPosts();
    } catch (e) {
      clearToken();
      showLogin('Session expired — please sign in again.');
    }
  }

  // --- Event wiring ---
  $('token-save').addEventListener('click', async () => {
    const t = $('token-input').value.trim();
    if (!t) return;
    setToken(t);
    $('token-input').value = '';
    $('setup-status').textContent = 'Verifying…';
    await start();
  });
  $('logout').addEventListener('click', () => {
    if (!confirm('Sign out and remove the saved token from this browser?')) return;
    clearToken();
    location.reload();
  });
  $('new-post').addEventListener('click', openEditor);
  $('refresh-list').addEventListener('click', refreshPosts);
  $('cancel').addEventListener('click', closeEditor);
  $('save-draft').addEventListener('click', () => {
    saveDraft();
    $('edit-status').textContent = 'Draft saved locally.';
    setTimeout(() => $('edit-status').textContent = '', 2500);
  });
  $('publish').addEventListener('click', async () => {
    const title = $('title').value.trim();
    const date  = $('date').value;
    const tags  = $('tags').value.trim();
    const body  = $('body').value;
    if (!title) { setStatus('Title is required.', 'err'); return; }
    if (!date)  { setStatus('Date is required.', 'err'); return; }
    if (!body.trim()) { setStatus('Body is empty.', 'err'); return; }

    $('publish').disabled = true;
    $('edit-status').textContent = 'Publishing…';
    try {
      const res = await publishPost({ title, date, tags, body });
      clearDraft();
      $('title').value = ''; $('tags').value = ''; $('body').value = '';
      updatePreview();
      closeEditor();
      setStatus(`Published! The site will rebuild in ~1 min. Commit: ${res.commit.sha.slice(0,7)}`, 'ok');
      refreshPosts();
    } catch (e) {
      setStatus(String(e), 'err');
    } finally {
      $('publish').disabled = false;
      $('edit-status').textContent = '';
    }
  });
  $('body').addEventListener('input', updatePreview);
  $('title').addEventListener('input', saveDraft);
  $('date').addEventListener('input', saveDraft);
  $('tags').addEventListener('input', saveDraft);

  start();
})();
</script>
</body>
</html>
